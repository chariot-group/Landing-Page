name: chariot-showcase-prod

services:

  chariot-showcase:
    image: ghcr.io/chariot-group/chariot-showcase-production:latest
    container_name: chariot-showcase-prod
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    ports:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_RECEIVER_EMAIL: ${NEXT_PUBLIC_RECEIVER_EMAIL}
      NEXT_PUBLIC_CHARIOT_URL: ${NEXT_PUBLIC_CHARIOT_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID}
      NEXT_PUBLIC_DISABLE_CHECKOUT: ${NEXT_PUBLIC_DISABLE_CHECKOUT}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      DISCORD_NEWSLETTER_WEBHOOK_URL: ${DISCORD_NEWSLETTER_WEBHOOK_URL}
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chariot-showcase-prod.rule=Host(`${SHOWCASE_HOST}`)"
      - "traefik.http.routers.chariot-showcase-prod.entrypoints=websecure"
      - "traefik.http.routers.chariot-showcase-prod.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chariot-showcase-prod-www.rule=Host(`www.${SHOWCASE_HOST}`)"
      - "traefik.http.routers.chariot-showcase-prod-www.entrypoints=websecure"
      - "traefik.http.routers.chariot-showcase-prod-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chariot-showcase-prod-www.middlewares=chariot-showcase-www-to-apex"
      - "traefik.http.routers.chariot-showcase-prod-www.service=noop@internal"
      - "traefik.http.middlewares.chariot-showcase-www-to-apex.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.chariot-showcase-www-to-apex.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.chariot-showcase-www-to-apex.redirectregex.permanent=true"
      - "traefik.http.services.chariot-showcase-prod.loadbalancer.server.port=3000"
      - "traefik.http.routers.chariot-showcase-prod.service=chariot-showcase-prod"
      - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true