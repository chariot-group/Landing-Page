name: CI/CD - Build, Test & Deploy

on:
  push:
    branches:
      - integ
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # Job CI pour le frontend web
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js for web
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies for web
        run: |
          npm ci

      - name: Format check for web
        working-directory: .
        run: npm run format

      - name: Build web
        working-directory: .
        run: npm run build

  # Job CD pour déployer le frontend (sur PR vers integ/main, push direct, ou déclenchement manuel)
  cd:
    runs-on: ubuntu-latest
    needs: [ci]
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/integ' || github.ref == 'refs/heads/main')) || (github.event_name == 'pull_request' && (github.base_ref == 'integ' || github.base_ref == 'main')) || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine environment and set variables
        id: env
        run: |
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "chariot_url=${{ secrets.PROD_NEXT_PUBLIC_CHARIOT_URL }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ secrets.PROD_API_URL }}" >> $GITHUB_OUTPUT
            echo "keycloak_url=${{ secrets.PROD_KEYCLOAK_URL }}" >> $GITHUB_OUTPUT
            echo "receiver_email=${{ secrets.PROD_NEXT_PUBLIC_RECEIVER_EMAIL }}" >> $GITHUB_OUTPUT
            echo "disable_checkout=${{ secrets.PROD_NEXT_PUBLIC_DISABLE_CHECKOUT }}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Chariot Frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/chariot-showcase-${{ steps.env.outputs.env_name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/chariot-showcase-${{ steps.env.outputs.env_name }}:${{ github.sha }}
          platforms: linux/amd64
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_CHARIOT_URL=${{ steps.env.outputs.chariot_url }}
            NEXT_PUBLIC_API_URL=${{ steps.env.outputs.api_url }}
            NEXT_PUBLIC_KEYCLOAK_URL=${{ steps.env.outputs.keycloak_url }}
            NEXT_PUBLIC_KEYCLOAK_REALM=chariot
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=chariot-app
            NEXT_PUBLIC_RECEIVER_EMAIL=${{ steps.env.outputs.receiver_email }}
            NEXT_PUBLIC_DISABLE_CHECKOUT=${{ steps.env.outputs.disable_checkout }}

      - name: Output image tags
        run: |
          echo "Pushed: ${{ env.REGISTRY }}/${{ env.OWNER }}/chariot-showcase-${{ steps.env.outputs.env_name }}:latest"
          echo "Pushed: ${{ env.REGISTRY }}/${{ env.OWNER }}/chariot-showcase-${{ steps.env.outputs.env_name }}:${{ github.sha }}"